services:
  telecodex:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: telecodex:local
    container_name: telecodex-local
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      TELECODEX_WORKSPACE: ${TELECODEX_CONTAINER_WORKSPACE:-/workspace}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
    volumes:
      # Mount Codex state while masking auth.json so credentials are not exposed in the container.
      - ${CODEX_HOME_DIR:-${HOME}/.codex}:/home/telecodex/.codex:rw
      - ./.telecodex/docker-empty-auth.json:/home/telecodex/.codex/auth.json:ro
      # Workspace visible to Codex inside the container.
      - ${TELECODEX_WORKSPACE_DIR:-${HOME}}:${TELECODEX_CONTAINER_WORKSPACE:-/workspace}:rw
      # Optional: enable git over SSH when needed.
      # - ${SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:/ssh-agent:ro
    # environment:
    #   SSH_AUTH_SOCK: /ssh-agent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 2.0
